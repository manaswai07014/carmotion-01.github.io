title: CarMotion Daily
description: Daily automotive news — curated, rewritten, and published fresh every morning.
url: https://carmotion-daily.pages.dev
baseurl: ""

# Theme & build
theme: minima  # we'll override heavily
markdown: kramdown
highlighter: rouge
permalink: /news/:year/:month/:day/:title/

# Collections
collections:
  news:
    output: true
    permalink: /news/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: news
    values:
      layout: news-item
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# Pagination
paginate: 12
paginate_path: "/page/:num/"

# Exclude build junk
exclude:
  - README.md
  - _drafts
  - scripts/

# SEO
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
